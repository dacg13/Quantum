<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#050508"/>
  <!-- Bloch sphere circle -->
  <circle cx="32" cy="32" r="22" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
  <!-- Equator ellipse -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3" fill="none"/>
  <!-- Vertical axis -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#00ffb3" stroke-width="1" stroke-opacity="0.4"/>
  <!-- State vector arrow -->
  <line x1="32" y1="32" x2="46" y2="16" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <circle cx="46" cy="16" r="3" fill="#00d4ff"/>
  <!-- |0⟩ dot at top -->
  <circle cx="32" cy="10" r="2" fill="#00d4ff" fill-opacity="0.7"/>
  <!-- |1⟩ dot at bottom -->
  <circle cx="32" cy="54" r="2" fill="#7b5ea7" fill-opacity="0.7"/>
</svg>
